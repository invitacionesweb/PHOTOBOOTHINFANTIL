<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Photobooth</title>
<link href="https://fonts.googleapis.com/css2?family=Schoolbell&display=swap" rel="stylesheet">
<style>

  /* ============================================
     🎨 COLORES — cambiá los dos de acá abajo nomás
     ============================================ */
  :root{
    --rosa: #E8C4B8;   /* color de fondo / botones secundarios */
    --verde: #7A9E7E;  /* color principal de botones */
    --oscuro: #3D2B1F;
    --blanco: #FFFFFF;
    --font: 'Schoolbell', cursive;
    --radius: 20px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:100%;height:100vh;overflow:hidden;font-family:var(--font);background:var(--rosa);}
  #app{width:100%;max-width:430px;height:100vh;margin:0 auto;position:relative;overflow:hidden;display:flex;flex-direction:column;}
  .screen{display:none;flex-direction:column;position:absolute;inset:0;background-size:cover;background-position:top center;background-repeat:no-repeat;}
  .screen.active{display:flex;}

  /* Screen 1 */
  #screen-1{background-image:var(--bg1);justify-content:flex-end;padding:0 28px 44px;}
  .content{display:flex;flex-direction:column;align-items:center;gap:14px;width:100%;}
  .tagline{font-size:28px;color:var(--blanco);text-align:center;line-height:1.3;text-shadow:0 1px 4px rgba(0,0,0,.25);}
  .format-label{font-size:19px;color:var(--blanco);text-shadow:0 1px 4px rgba(0,0,0,.2);}
  .layout-options{display:flex;gap:14px;width:100%;}.layout-options .layout-card{min-height:160px;}
  .layout-card{flex:1;background:rgba(255,255,255,.75);border-radius:var(--radius);border:2.5px solid transparent;padding:14px 10px 12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;transition:border-color .2s,background .2s;}
  .layout-card.selected{border-color:var(--verde);background:rgba(255,255,255,.95);}
  .layout-preview{width:44px;display:flex;flex-direction:column;gap:4px;}
  .layout-preview.strip div{width:100%;aspect-ratio:1;background:var(--rosa);border-radius:4px;}
  .layout-preview.grid{width:88px;height:88px;display:grid;grid-template-columns:1fr 1fr;gap:4px;margin:0 auto;}
  .layout-preview.grid div{aspect-ratio:1;background:var(--rosa);border-radius:4px;}
  .layout-card span{font-size:13px;color:var(--oscuro);}
  .btn{width:100%;padding:15px;border-radius:50px;border:none;background:var(--verde);color:var(--blanco);font-family:var(--font);font-size:22px;cursor:pointer;transition:opacity .15s,transform .1s;text-shadow:0 1px 3px rgba(0,0,0,.15);}
  .btn:active{transform:scale(.97);opacity:.9;}

  /* Screen 2 */
  #screen-2{background-image:var(--bg2);padding:44px 24px 28px;gap:14px;align-items:center;justify-content:center;}
  .cam-header{width:100%;display:flex;justify-content:space-between;align-items:center;}
  .cam-title{font-size:28px;color:var(--blanco);text-shadow:0 1px 4px rgba(0,0,0,.2);}
  .flip-btn{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.5);border:none;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .camera-wrap{position:relative;width:100%;aspect-ratio:3/4;border-radius:var(--radius);overflow:hidden;background:#111;flex-shrink:0;box-shadow:0 4px 20px rgba(0,0,0,.2);}
  #video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1);}
  .flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;}
  .screen-flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:20;}
  .countdown{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--font);font-size:100px;color:#fff;text-shadow:0 2px 12px rgba(0,0,0,.5);pointer-events:none;opacity:0;}
  .shots-progress{display:flex;gap:10px;justify-content:center;}
  .dot-shot{width:14px;height:14px;border-radius:50%;border:2px solid var(--blanco);background:transparent;transition:background .2s;}
  .dot-shot.done{background:var(--blanco);}
  .shutter{width:72px;height:72px;border-radius:50%;background:var(--blanco);border:4px solid var(--rosa);box-shadow:0 0 0 2px var(--blanco);cursor:pointer;flex-shrink:0;transition:transform .1s;}
  .shutter:active{transform:scale(.93);}
  .cam-hint{font-size:15px;color:var(--blanco);text-align:center;text-shadow:0 1px 3px rgba(0,0,0,.2);}

  /* Screen 3 */
  #screen-3{background-image:var(--bg3);justify-content:flex-end;padding:0 28px 260px;align-items:center;text-align:center;}
  #screen-3 h2{font-size:32px;color:var(--blanco);line-height:1.2;margin-bottom:10px;}
  #screen-3 .sub{font-size:22px;color:var(--blanco);margin-bottom:20px;line-height:1.4;}
  #share-status{font-size:16px;color:var(--blanco);min-height:22px;margin-bottom:12px;}
  .btn-row{display:flex;gap:12px;width:100%;}
  .btn-ghost{flex:1;padding:14px;border-radius:50px;border:2px solid var(--blanco);background:transparent;color:var(--blanco);font-family:var(--font);font-size:20px;cursor:pointer;}
  .btn-primary{flex:1;padding:14px;border-radius:50px;border:none;background:var(--verde);color:var(--blanco);font-family:var(--font);font-size:20px;cursor:pointer;}

  /* Screen 4 */
  #screen-4{background-color:var(--rosa);justify-content:flex-end;padding:0 28px 36px;gap:12px;align-items:center;}
  .final-frame{width:56%;border-radius:var(--radius);overflow:hidden;box-shadow:0 6px 24px rgba(0,0,0,.2);flex-shrink:0;}
  #finalImg{width:100%;display:block;}
  #screen-4 h2{font-size:28px;color:var(--blanco);text-shadow:0 1px 4px rgba(0,0,0,.2);}
  .final-btns{display:flex;flex-direction:column;gap:10px;width:100%;}
  .download-hint{font-size:13px;color:rgba(255,255,255,.8);text-align:center;}
  .redo{font-family:var(--font);font-size:16px;color:rgba(255,255,255,.8);background:none;border:none;cursor:pointer;text-decoration:underline;text-align:center;}

</style>
</head>
<body>
<div id="app" style="
  --bg1: url('fondos/fondo-inicio.png');
  --bg3: url('fondos/fondo-compartir.png');
  --bg2: url('fondos/fondo-camara.png');
">
  <div class="screen-flash" id="screenFlash"></div>

  <section class="screen active" id="screen-1">
    <div class="content">
      <p class="tagline">¡Sacate una foto<br>para el recuerdo!</p>
      <p class="format-label">Elegí el formato</p>
      <div class="layout-options">
        <div class="layout-card selected" data-layout="strip" onclick="selectLayout('strip')">
          <div class="layout-preview strip"><div></div><div></div><div></div></div>
          <span>Tira de 3</span>
        </div>
        <div class="layout-card" data-layout="grid" onclick="selectLayout('grid')">
          <div class="layout-preview grid"><div></div><div></div><div></div><div></div></div>
          <span>Grilla 2×2</span>
        </div>
      </div>
      <button class="btn" onclick="goToCamera()">¡Empezar! 📸</button>
    </div>
  </section>

  <section class="screen" id="screen-2">
    <div class="cam-header">
      <span class="cam-title">¡Sonreí! 😄</span>
      <button class="flip-btn" onclick="switchCamera()">⟲</button>
    </div>
    <div class="camera-wrap">
      <video id="video" autoplay playsinline muted></video>
      <div class="flash" id="flash"></div>
      <div class="countdown" id="countdown">3</div>
    </div>
    <div class="shots-progress" id="shotsProgress"></div>
    <div class="shutter" id="shutterBtn" onclick="startCountdown()"></div>
    <p class="cam-hint" id="camHint">Tocá el círculo para sacar la foto</p>
  </section>

  <section class="screen" id="screen-3">
    <h2>¿La compartimos<br>con los papis? 🥰</h2>
    <p class="sub">Si decís que sí, la foto se suma<br>al álbum de recuerdos.</p>
    <div id="share-status"></div>
    <div class="btn-row">
      <button class="btn-ghost" onclick="skipShare()">No, gracias</button>
      <button class="btn-primary" onclick="confirmShare()">¡Sí! 💛</button>
    </div>
  </section>

  <section class="screen" id="screen-4">
    <div class="final-frame"><img id="finalImg" alt="tu foto"></div>
    <h2>¡Qué foto más linda! 🎉</h2>
    <div class="final-btns">
      <button class="btn" onclick="savePhoto()">Guardar en el celu 📱</button>
      <button class="btn-ghost" style="border-color:rgba(255,255,255,.6)" onclick="sharePhoto()">Compartir 🔗</button>
    </div>
    <div class="download-hint" id="downloadHint"></div>
    <button class="redo" onclick="restart()">Sacar otra foto</button>
  </section>

  <canvas id="hiddenCapture" style="display:none"></canvas>
  <canvas id="composeCanvas" style="display:none"></canvas>
</div>
<script>

// ============================================
// ⚙️ CONFIGURACIÓN — editá solo esto para cada cliente
// ============================================
const CONFIG = {
  // Nombre del festejado/a (aparece en el fondo de la foto final)
  kidName: 'Rita',

  // Identificador único de este cliente para el Apps Script central.
  // Tiene que coincidir con una clave del objeto CARPETAS del script
  // (ej: si en el script pusiste 'rita': 'ID_CARPETA', acá va cliente: 'rita').
  cliente: 'rita',

  // Imágenes de fondo: están en la carpeta "fondos/" al lado de este archivo.
  // Para cambiarlas, reemplazá el archivo dentro de esa carpeta
  // manteniendo el mismo nombre (o cambiá el nombre acá abajo).
  bgFoto:     'fondos/fondo-foto-tira.png',   // fondo cuando se elige "Tira de 3"
  bgFotoGrid: 'fondos/fondo-foto-grilla.png', // fondo cuando se elige "Grilla 2x2"

  // Link de la carpeta de Google Drive donde se guardan las fotos de los invitados.
  // (Este es el link de la carpeta, para que lo tengas a mano. La subida real
  // de las fotos usa el link del Apps Script de abajo, "scriptUrl")
  driveFolderLink: '1Y9Bn0IiT-z_rnvjLOQZ_5BO6Ygy0Gmxr',

  // URL del Apps Script (Web App) conectado a la carpeta de Drive de arriba.
  // Sin esto, el botón "Sí, compartir con los papis" no envía la foto a ningún lado.
  scriptUrl: 'https://script.google.com/macros/s/AKfycbysWlmV3bykA3ON9te5y4GlZ1ephmlhF-2C5jFmrAHELxwG5gSBqFep3BFCKwpFFmUu/exec',
};

document.title = 'Photobooth · ' + CONFIG.kidName;

const CW = 1080, CH = 1920, PAD = 34;
let layout = 'strip', shotsNeeded = 3, shotsTaken = [];
let stream = null, facingMode = 'user', counting = false;
const bgCache = { strip:{status:'idle', img:null}, grid:{status:'idle', img:null} };
const photoCache = {};

// Shared square size so strip and grid look the same
function squareSize() {
  const byWidth  = (CW - PAD * 3) / 2;   // max for 2 cols (grid)
  const byHeight = (CH - PAD * 4) / 3;   // max for 3 rows (strip)
  return Math.min(byWidth, byHeight);
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function selectLayout(l) {
  layout = l;
  document.querySelectorAll('.layout-card').forEach(c =>
    c.classList.toggle('selected', c.dataset.layout === l)
  );
}

async function goToCamera() {
  shotsNeeded = layout === 'strip' ? 3 : 4;
  shotsTaken = [];
  renderProgress();
  document.getElementById('camHint').textContent = 'Tocá el círculo para sacar la foto';
  showScreen('screen-2');
  facingMode = 'user';
  await startCamera();
}

async function startCamera() {
  if(stream) stream.getTracks().forEach(t => t.stop());
  const video = document.getElementById('video');
  video.style.transform = facingMode === 'user' ? 'scaleX(-1)' : 'none';
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video:{ facingMode }, audio:false });
    video.srcObject = stream;
  } catch(err) {
    document.getElementById('camHint').textContent = 'No pudimos acceder a la cámara 😕';
  }
}

async function switchCamera() {
  facingMode = facingMode === 'user' ? 'environment' : 'user';
  await startCamera();
}

function renderProgress() {
  const el = document.getElementById('shotsProgress');
  el.innerHTML = Array.from({length:shotsNeeded}, (_,i) =>
    '<div class="dot-shot ' + (i < shotsTaken.length ? 'done' : '') + '"></div>'
  ).join('');
}

function startCountdown() {
  if(counting) return;
  counting = true;
  document.getElementById('shutterBtn').style.opacity = '.4';
  const cd = document.getElementById('countdown');
  let n = 3;
  cd.style.opacity = 1;
  cd.textContent = n;
  const iv = setInterval(() => {
    n--;
    if(n > 0) { cd.textContent = n; }
    else {
      clearInterval(iv);
      cd.style.opacity = 0;
      capturePhoto();
      counting = false;
      document.getElementById('shutterBtn').style.opacity = '1';
    }
  }, 900);
}

function capturePhoto() {
  const video = document.getElementById('video');
  const canvas = document.getElementById('hiddenCapture');
  const size = Math.min(video.videoWidth, video.videoHeight);
  canvas.width = 600; canvas.height = 600;
  const ctx = canvas.getContext('2d');
  const sx = (video.videoWidth - size)/2;
  const sy = (video.videoHeight - size)/2;
  ctx.save();
  if(facingMode === 'user') { ctx.translate(600,0); ctx.scale(-1,1); }
  ctx.drawImage(video, sx, sy, size, size, 0, 0, 600, 600);
  ctx.restore();

  shotsTaken.push(canvas.toDataURL('image/jpeg', 0.92));

  const flash = document.getElementById('flash');
  flash.style.transition='none'; flash.style.opacity=.85;
  requestAnimationFrame(() => { flash.style.transition='opacity .35s'; flash.style.opacity=0; });
  const sf = document.getElementById('screenFlash');
  sf.style.transition='none'; sf.style.opacity=1;
  requestAnimationFrame(() => { sf.style.transition='opacity .45s'; sf.style.opacity=0; });
  if(navigator.vibrate) navigator.vibrate(40);

  renderProgress();
  if(shotsTaken.length < shotsNeeded) {
    document.getElementById('camHint').textContent = 'Foto ' + (shotsTaken.length+1) + ' de ' + shotsNeeded + ' 📸';
  } else {
    if(stream) stream.getTracks().forEach(t => t.stop());
    showScreen('screen-3');
    buildComposite();
  }
}

// ---- COMPOSITE ----
function buildComposite() {
  const canvas = document.getElementById('composeCanvas');
  canvas.width = CW; canvas.height = CH;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#fff'; ctx.fillRect(0,0,CW,CH);

  const cache = bgCache[layout];
  const src = layout === 'grid' ? CONFIG.bgFotoGrid : CONFIG.bgFoto;

  if(cache.status === 'ready') {
    ctx.drawImage(cache.img, 0, 0, CW, CH);
    drawPhotos(ctx);
  } else if(cache.status !== 'loading') {
    cache.status = 'loading';
    const img = new Image();
    img.onload = () => { cache.img=img; cache.status='ready'; buildComposite(); };
    img.src = src;
  }
}

function drawPhotos(ctx) {
  const size = squareSize();
  if(layout === 'strip') {
    const stripSize = size * 0.798;
    const totalH = stripSize*3 + PAD*2;
    const startY = (CH - totalH)/2;
    const x = (CW - stripSize)/2;
    shotsTaken.forEach((src,i) => drawSlot(ctx, src, x, startY + i*(stripSize+PAD), stripSize, stripSize));
  } else {
    const gridSize = size * 0.96;
    const totalW = gridSize*2 + PAD;
    const totalH = gridSize*2 + PAD;
    const startX = (CW - totalW)/2;
    const startY = (CH - totalH)/2;
    shotsTaken.forEach((src,i) => {
      const col=i%2, row=Math.floor(i/2);
      drawSlot(ctx, src, startX+col*(gridSize+PAD), startY+row*(gridSize+PAD), gridSize, gridSize);
    });
  }
}

function drawSlot(ctx, src, x, y, w, h) {
  if(!photoCache[src]) {
    const img = new Image();
    img.onload = () => { photoCache[src]=img; buildComposite(); };
    img.src = src;
    photoCache[src] = 'loading';
    return;
  }
  if(photoCache[src] === 'loading') return;
  const img = photoCache[src];
  ctx.save();
  const r = 18;
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath(); ctx.clip();
  const ir=img.width/img.height, tr=w/h;
  let sx,sy,sw,sh;
  if(ir>tr){ sh=img.height; sw=sh*tr; sx=(img.width-sw)/2; sy=0; }
  else{ sw=img.width; sh=sw/tr; sx=0; sy=(img.height-sh)/2; }
  ctx.drawImage(img,sx,sy,sw,sh,x,y,w,h);
  ctx.restore();
}

// ---- SHARE WITH PAPIS ----
async function confirmShare() {
  const statusEl = document.getElementById('share-status');
  statusEl.textContent = 'Compartiendo... 💛';
  if(CONFIG.scriptUrl) {
    try {
      const dataUrl = document.getElementById('composeCanvas').toDataURL('image/jpeg', 0.82);
      await fetch(CONFIG.scriptUrl, {
        method: 'POST',
        body: JSON.stringify({ image:dataUrl, name:CONFIG.kidName, cliente:CONFIG.cliente })
      });
    } catch(_) {}
  }
  statusEl.textContent = '¡Listo! Los papis ya tienen la foto 🥰';
  await new Promise(r => setTimeout(r, 1000));
  goToFinal();
}

function skipShare() { goToFinal(); }

// ---- FINAL ----
function goToFinal() {
  const dataUrl = document.getElementById('composeCanvas').toDataURL('image/png', 1.0);
  document.getElementById('finalImg').src = dataUrl;
  showScreen('screen-4');
}

async function savePhoto() {
  const dataUrl = document.getElementById('finalImg').src;
  const hintEl = document.getElementById('downloadHint');
  try {
    const res = await fetch(dataUrl);
    const blob = await res.blob();
    const file = new File([blob], 'photobooth-' + CONFIG.kidName.toLowerCase() + '.png', {type:'image/png'});
    if(navigator.canShare && navigator.canShare({files:[file]})) {
      await navigator.share({files:[file], title:'Mi foto del cumple de ' + CONFIG.kidName});
      hintEl.textContent = '';
      return;
    }
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download='photobooth-' + CONFIG.kidName.toLowerCase() + '.png';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 4000);
    hintEl.textContent = '¡Guardada! Revisá tu carpeta de Descargas 📁';
  } catch(err) {
    window.open(dataUrl, '_blank');
    hintEl.textContent = 'Mantené presionada la imagen para guardarla 📱';
  }
}

async function sharePhoto() {
  const dataUrl = document.getElementById('finalImg').src;
  try {
    const res = await fetch(dataUrl);
    const blob = await res.blob();
    const file = new File([blob], 'photobooth-' + CONFIG.kidName.toLowerCase() + '.png', {type:'image/png'});
    if(navigator.canShare && navigator.canShare({files:[file]})) {
      await navigator.share({files:[file], title:'Mi foto del cumple de ' + CONFIG.kidName});
      return;
    }
  } catch(err) {}
  alert('Tu navegador no permite compartir directo. Guardá la imagen primero.');
}

function restart() {
  shotsTaken = [];
  document.getElementById('share-status').textContent = '';
  document.getElementById('downloadHint').textContent = '';
  document.getElementById('camHint').textContent = 'Tocá el círculo para sacar la foto';
  Object.keys(photoCache).forEach(k => delete photoCache[k]);
  bgCache.strip.status='idle'; bgCache.strip.img=null;
  bgCache.grid.status='idle'; bgCache.grid.img=null;
  showScreen('screen-1');
}

</script>
</body>
</html>
